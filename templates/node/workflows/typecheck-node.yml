# Node.js Type Check — TypeScript
# Copy to: .github/workflows/typecheck-node.yml

name: Type Check

on:
  pull_request:
    branches: ["<!-- CUSTOMIZE: default_branch -->"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: ["<!-- CUSTOMIZE: default_branch -->"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

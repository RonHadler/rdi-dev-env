name: Deploy Firestore Rules & Indexes

# Deploys firestore.rules and firestore.indexes.json to all environments
# when either file changes. These files should be identical across envs.
#
# Deployment order: QA → Staging → Production (sequential gates).
# Can also be triggered manually to force a sync (e.g., after initial
# project setup or to recover from drift).
#
# Prerequisites:
# 1. firebase.json in repo root with firestore config
# 2. firestore.rules and firestore.indexes.json in repo root
# 3. GitHub Environments (qa, staging, production) with GCP secrets
# 4. Deploy service account needs firebaserules.admin + datastore.indexAdmin
#
# <!-- CUSTOMIZE: Adjust environments and branch to match your setup -->

on:
  push:
    branches: [develop]  # <!-- CUSTOMIZE: your default branch -->
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for WIF

concurrency:
  group: deploy-firestore
  cancel-in-progress: true

jobs:
  # <!-- CUSTOMIZE: Add/remove environments to match your setup -->
  deploy-qa:
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules & indexes
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "Deploying Firestore to ${PROJECT} (qa)"
          npx --yes firebase-tools deploy \
            --only firestore \
            --project "$PROJECT" \
            --force

      - name: Deployment summary
        if: always()
        run: |
          echo "## Firestore Deploy — qa" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | qa |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    needs: [deploy-qa]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules & indexes
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "Deploying Firestore to ${PROJECT} (staging)"
          npx --yes firebase-tools deploy \
            --only firestore \
            --project "$PROJECT" \
            --force

      - name: Deployment summary
        if: always()
        run: |
          echo "## Firestore Deploy — staging" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | staging |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules & indexes
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "Deploying Firestore to ${PROJECT} (production)"
          npx --yes firebase-tools deploy \
            --only firestore \
            --project "$PROJECT" \
            --force

      - name: Deployment summary
        if: always()
        run: |
          echo "## Firestore Deploy — production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

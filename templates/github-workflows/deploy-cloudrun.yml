# Cloud Run Deployment Template
# Copy to: .github/workflows/deploy-{environment}.yml
#
# PREREQUISITES:
#   1. Set up Workload Identity Federation in GCP (Pulumi shared/workload-identity.ts)
#   2. Create deploy service account (Pulumi shared/deploy-service-account.ts)
#   3. Add required secrets to GitHub Environment (see env section below)
#   4. Create GitHub Environments with appropriate protection rules
#   5. Ensure Dockerfile exists in repo root
#
# CUSTOMIZE: Search for "<!-- CUSTOMIZE" and replace all placeholder values.

name: Deploy to Cloud Run

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: true  # <!-- CUSTOMIZE: set false for staging/production -->

env:
  GCP_REGION: 'us-central1'                              # <!-- CUSTOMIZE: GCP region -->
  SERVICE_NAME: 'my-service'                             # <!-- CUSTOMIZE: Cloud Run service name -->
  HEALTH_CHECK_PATH: '/health'                           # <!-- CUSTOMIZE: health check endpoint -->

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate with GCP via Workload Identity Federation ──
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build & Push ──
      - name: Build Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}-docker/${{ env.SERVICE_NAME }}"
          TAG="${{ github.sha }}"

          docker build \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --build-arg BUILD_SHA="${TAG}" \
            --build-arg BUILD_ENV="${{ env.TARGET_ENV }}" \
            .

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.IMAGE }}:${{ env.TAG }}"
          docker push "${{ env.IMAGE }}:latest"

      # ── Deploy ──
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ env.TAG }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          # <!-- CUSTOMIZE: Add env vars, secrets, flags as needed -->
          # env_vars: |
          #   NODE_ENV=production
          # secrets: |
          #   FIREBASE_SERVICE_ACCOUNT=firebase-sa:latest

      - name: Get service URL
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
          echo "SERVICE_URL=${{ steps.deploy.outputs.url }}" >> "$GITHUB_ENV"

      # ── Health Check ──
      # For public services: use HTTP curl against HEALTH_CHECK_PATH.
      # For IAM-protected services (no public health endpoint): replace the
      # curl block below with revision-level gcloud check:
      #
      #   REVISION=$(gcloud run revisions list \
      #     --service=${{ env.SERVICE_NAME }} --region=${{ env.GCP_REGION }} \
      #     --project=${{ secrets.GCP_PROJECT_ID }} \
      #     --format='value(REVISION)' --sort-by='~CREATED' --limit=1)
      #   READY=$(gcloud run revisions describe "${REVISION}" \
      #     --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} \
      #     --format='value(status.conditions.filter("type","Ready").map().extract("status").flatten())')
      #
      # IMPORTANT: Do NOT use `gcloud run services describe` with
      # `status.conditions[0].status` — the index isn't guaranteed to be the
      # "Ready" condition and service-level status lags during transitions,
      # causing false rollbacks on healthy deploys.
      - name: Health check
        id: health
        run: |
          URL="${{ env.SERVICE_URL }}${{ env.HEALTH_CHECK_PATH }}"
          echo "Checking: ${URL}"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Got HTTP $STATUS, waiting 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          echo "health_failed=true" >> "$GITHUB_OUTPUT"

      # ── Rollback on failure ──
      - name: Rollback on health check failure
        if: steps.health.outputs.health_failed == 'true'
        run: |
          echo "::warning::Rolling back to previous revision..."

          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(REVISION)' \
            --sort-by='~CREATED' \
            --limit=2 | tail -1)

          if [ -n "$PREVIOUS" ]; then
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --to-revisions="${PREVIOUS}=100"
            echo "Rolled back to revision: ${PREVIOUS}"
          else
            echo "::error::No previous revision found for rollback"
          fi

          exit 1

      # ── Summary ──
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ env.TARGET_ENV }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | ${{ env.GCP_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE }}:${{ env.TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ env.SERVICE_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

# Staging Deployment Template
# Copy to: .github/workflows/deploy-staging.yml
#
# PREREQUISITES:
#   1. ci.yml must exist (this workflow calls it as a gate)
#   2. Set up Workload Identity Federation in GCP
#   3. Create deploy service account
#   4. Add required secrets to GitHub "staging" Environment
#   5. Ensure Dockerfile exists in repo root
#
# CUSTOMIZE: Search for "<!-- CUSTOMIZE" and replace all placeholder values.

name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  GCP_REGION: 'us-central1'                                    # <!-- CUSTOMIZE: GCP region -->
  SERVICE_NAME: '<!-- CUSTOMIZE: service-name -->-staging'      # <!-- CUSTOMIZE: Cloud Run service name -->
  HEALTH_CHECK_PATH: '/health'                                  # <!-- CUSTOMIZE: health check endpoint -->

jobs:
  ci:
    uses: ./.github/workflows/ci.yml  # Run lint + typecheck + tests before deploying

  deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mcp-repo/${{ env.SERVICE_NAME }}"
          TAG="$(git rev-parse HEAD)"

          docker build \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --build-arg BUILD_SHA="${TAG}" \
            .

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.IMAGE }}:${{ env.TAG }}"
          docker push "${{ env.IMAGE }}:latest"

      # <!-- CUSTOMIZE: Add service-specific flags (secrets, env vars, Cloud SQL) -->
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ env.TAG }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: >-
            --service-account=<!-- CUSTOMIZE: service-account -->

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --to-latest

      - name: Get service URL
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
          echo "SERVICE_URL=${{ steps.deploy.outputs.url }}" >> "$GITHUB_ENV"

      - name: Generate ID token for health probe
        id: id-token
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: 'id_token'
          id_token_audience: ${{ steps.deploy.outputs.url }}
          id_token_include_email: true

      - name: Verify deployment
        id: health
        run: |
          echo "=== Tier 1: Revision Readiness ==="
          READY="Unknown"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5: checking latest revision..."
            LATEST_REVISION=$(gcloud run revisions list \
              --service="${{ env.SERVICE_NAME }}" \
              --region="${{ env.GCP_REGION }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format='value(REVISION)' \
              --sort-by='~CREATED' \
              --limit=1 2>/dev/null || echo "")

            if [ -z "$LATEST_REVISION" ]; then
              echo "No revision found, waiting 10s..."
              sleep 10
              continue
            fi

            READY=$(gcloud run revisions describe "$LATEST_REVISION" \
              --region="${{ env.GCP_REGION }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format='json(status.conditions)' 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((c['status'] for c in d.get('status',{}).get('conditions',[]) if c.get('type')=='Ready'),'Unknown'))" || echo "Unknown")

            if [ "$READY" = "True" ]; then
              echo "Revision $LATEST_REVISION is ready"
              break
            fi
            echo "Revision not ready (status: $READY), waiting 10s..."
            sleep 10
          done

          if [ "$READY" != "True" ]; then
            echo "::error::Tier 1 failed: revision not ready after 5 attempts"
            echo "health_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo ""
          echo "=== Tier 2: Traffic Routing ==="
          TRAFFIC=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='json(status.traffic)' 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          traffic = d.get('status', {}).get('traffic', [])
          for t in traffic:
            if t.get('revisionName') == '$LATEST_REVISION':
              print(t.get('percent', 0))
              sys.exit(0)
          print(0)
          " || echo "0")

          if [ "$TRAFFIC" != "100" ]; then
            echo "::error::Tier 2 failed: latest revision has ${TRAFFIC}% traffic (expected 100%)"
            echo "health_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Latest revision has 100% traffic"

          echo ""
          echo "=== Tier 3: HTTP Health Probe ==="
          TOKEN="${{ steps.id-token.outputs.id_token }}"

          if [ -z "$TOKEN" ]; then
            echo "::warning::Could not generate identity token — skipping HTTP probe"
            echo "Tier 3 skipped (token generation failed). Tiers 1-2 passed."
            exit 0
          fi

          for i in 1 2 3; do
            echo "Attempt $i/3: probing ${{ env.SERVICE_URL }}${{ env.HEALTH_CHECK_PATH }}..."
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${TOKEN}" \
              "${{ env.SERVICE_URL }}${{ env.HEALTH_CHECK_PATH }}" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health probe passed (HTTP 200)"
              echo ""
              echo "All 3 verification tiers passed."
              exit 0
            fi
            echo "Got HTTP $STATUS, waiting 10s..."
            sleep 10
          done

          echo "::error::Tier 3 failed: HTTP health probe returned $STATUS after 3 attempts"
          echo "health_failed=true" >> "$GITHUB_OUTPUT"

      - name: Rollback on health check failure
        if: steps.health.outputs.health_failed == 'true'
        run: |
          echo "::warning::Rolling back to previous revision..."
          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(REVISION)' \
            --sort-by='~CREATED' \
            --limit=2 | sed -n '2p')

          if [ -n "$PREVIOUS" ]; then
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --to-revisions="${PREVIOUS}=100"
            echo "Rolled back to revision: ${PREVIOUS}"
          else
            echo "::error::No previous revision found for rollback"
          fi
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Staging Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | Staging |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | ${{ env.GCP_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE }}:${{ env.TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ env.SERVICE_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

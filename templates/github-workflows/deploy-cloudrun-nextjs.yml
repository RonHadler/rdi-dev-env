# Cloud Run Deployment Template — Next.js Variant
# Copy to: .github/workflows/deploy-{environment}.yml
#
# Extends the base deploy-cloudrun.yml with:
#   - NEXT_PUBLIC_* secret fetching from GCP Secret Manager
#   - Build args passed to Docker for Next.js static compilation
#   - Multi-stage Docker build targeting 'production' stage
#
# PREREQUISITES:
#   1. Workload Identity Federation configured (Pulumi shared/workload-identity.ts)
#   2. Deploy service account with secretmanager.secretAccessor (Pulumi shared/deploy-service-account.ts)
#   3. NEXT_PUBLIC_* secrets populated in GCP Secret Manager
#   4. GitHub Environments with secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOY_SERVICE_ACCOUNT, GCP_PROJECT_ID
#   5. Multi-stage Dockerfile with 'production' target
#
# CUSTOMIZE: Search for "<!-- CUSTOMIZE" and replace all placeholder values.

name: Deploy to Cloud Run (Next.js)

on:
  push:
    branches: [develop]                                  # <!-- CUSTOMIZE: trigger branch -->
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true  # <!-- CUSTOMIZE: set false for staging/production -->

env:
  GCP_REGION: 'us-central1'                              # <!-- CUSTOMIZE: GCP region -->
  SERVICE_NAME: 'my-service'                             # <!-- CUSTOMIZE: Cloud Run service name -->
  HEALTH_CHECK_PATH: '/api/health/ping'                  # <!-- CUSTOMIZE: health check endpoint -->

jobs:
  # ── Optional: Gate on CI ──
  # ci:
  #   uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    # needs: [ci]                                         # <!-- CUSTOMIZE: uncomment to gate on CI -->
    environment: staging                                  # <!-- CUSTOMIZE: environment name -->

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # ── Authenticate with GCP via Workload Identity Federation ──
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Fetch NEXT_PUBLIC_* secrets from GCP Secret Manager ──
      # Uses dynamic delimiter for robustness against special characters in secret values
      - name: Fetch build secrets from Secret Manager
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"

          fetch_secret() {
            local name="$1"
            local optional="${2:-false}"
            local val
            if [ "$optional" = "true" ]; then
              val=$(gcloud secrets versions access latest --secret="$name" --project="$PROJECT" 2>/dev/null || echo '')
            else
              val=$(gcloud secrets versions access latest --secret="$name" --project="$PROJECT")
            fi
            local delim
            delim=$(openssl rand -hex 8)
            echo "${name}<<${delim}" >> "$GITHUB_ENV"
            echo "$val" >> "$GITHUB_ENV"
            echo "${delim}" >> "$GITHUB_ENV"
          }

          # <!-- CUSTOMIZE: Add/remove secrets as needed -->
          fetch_secret NEXT_PUBLIC_FIREBASE_API_KEY
          fetch_secret NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          fetch_secret NEXT_PUBLIC_FIREBASE_PROJECT_ID
          fetch_secret NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          fetch_secret NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          fetch_secret NEXT_PUBLIC_FIREBASE_APP_ID
          fetch_secret NEXT_PUBLIC_DEBUG_MODE
          fetch_secret NEXT_PUBLIC_APP_URL
          fetch_secret NEXT_PUBLIC_APP_ENV
          fetch_secret NEXT_PUBLIC_SENTRY_DSN true

      # ── Build & Push ──
      - name: Build Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/elevateai-docker/${{ env.SERVICE_NAME }}"
          # Use git rev-parse instead of github.sha — when deploying a custom ref
          # (e.g., v1.2.0 via workflow_dispatch), github.sha resolves to the trigger
          # branch, not the checked-out ref.
          TAG="$(git rev-parse HEAD)"

          # Use native bash $VAR expansion (not ${{ env.VAR }}) to prevent shell
          # injection if a secret value contains double-quote characters.
          docker build \
            --target production \
            --platform linux/amd64 \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$NEXT_PUBLIC_FIREBASE_APP_ID" \
            --build-arg NEXT_PUBLIC_DEBUG_MODE="$NEXT_PUBLIC_DEBUG_MODE" \
            --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
            --build-arg NEXT_PUBLIC_APP_ENV="$NEXT_PUBLIC_APP_ENV" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="$NEXT_PUBLIC_SENTRY_DSN" \
            .

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.IMAGE }}:${{ env.TAG }}"
          docker push "${{ env.IMAGE }}:latest"

      # ── Deploy ──
      # Only update the container image — service config (memory, CPU, scaling,
      # secrets, IAM) is managed by Pulumi. This prevents GitHub Actions from
      # overwriting infrastructure that Pulumi owns.
      - name: Update Cloud Run image
        id: deploy
        run: |
          gcloud run services update "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --image="${{ env.IMAGE }}:${{ env.TAG }}"

          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')

          echo "Service URL: ${SERVICE_URL}"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      # ── Health Check ──
      - name: Health check
        id: health
        run: |
          URL="${{ env.SERVICE_URL }}${{ env.HEALTH_CHECK_PATH }}"
          echo "Checking: ${URL}"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Got HTTP $STATUS, waiting 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          echo "health_failed=true" >> "$GITHUB_OUTPUT"

      # ── Rollback on failure ──
      - name: Rollback on health check failure
        if: steps.health.outputs.health_failed == 'true'
        run: |
          echo "::warning::Rolling back to previous revision..."

          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(REVISION)' \
            --sort-by='~CREATED' \
            --limit=2 | tail -1)

          if [ -n "$PREVIOUS" ]; then
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --to-revisions="${PREVIOUS}=100"
            echo "Rolled back to revision: ${PREVIOUS}"
          else
            echo "::error::No previous revision found for rollback"
          fi

          exit 1

      # ── Summary ──
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | ${{ env.GCP_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Project** | ${{ secrets.GCP_PROJECT_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE }}:${{ env.TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ env.SERVICE_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

name: Security Scan

on:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # Weekly on Monday at 08:00 UTC

permissions:
  pull-requests: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "## Secret Detection" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          MATCHES=""
          for pattern in "PRIVATE.KEY" "BEGIN RSA" "BEGIN DSA" "BEGIN EC" "password\s*=" "secret\s*=" "api_key\s*=" "token\s*="; do
            HITS=$(grep -rnE --include="*.rs" --include="*.toml" --exclude-dir=target --exclude-dir=.git "$pattern" . 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              FOUND=1
              # Show file:line only (never the matched content)
              MATCHES="${MATCHES}$(printf "%s\n" "$HITS" | awk -F: '{print $1":"$2}')"$'\n'
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Potential secrets detected in source files"
            echo "**Files with potential secrets:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            printf "%s\n" "$MATCHES" | sort -u | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "No secrets detected." >> $GITHUB_STEP_SUMMARY

  unsafe-check:
    name: Unsafe Block Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unsafe blocks
        run: |
          echo "## Unsafe Block Audit" >> $GITHUB_STEP_SUMMARY
          UNSAFE_COUNT=$(grep -rnE 'unsafe\s*(fn|trait|impl|\{)' --include="*.rs" --exclude-dir=target --exclude-dir=.git . 2>/dev/null | wc -l || true)
          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo "::warning::Found $UNSAFE_COUNT unsafe block(s) — verify each has a SAFETY comment"
            grep -rnE 'unsafe\s*(fn|trait|impl|\{)' --include="*.rs" --exclude-dir=target --exclude-dir=.git . 2>/dev/null || true
            echo "Found $UNSAFE_COUNT unsafe block(s). Verify each has a \`// SAFETY:\` justification." >> $GITHUB_STEP_SUMMARY
          else
            echo "No unsafe blocks found." >> $GITHUB_STEP_SUMMARY
          fi

  summary:
    name: Post Summary
    runs-on: ubuntu-latest
    needs: [audit, secrets, unsafe-check]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const auditResult = '${{ needs.audit.result }}';
            const secretsResult = '${{ needs.secrets.result }}';
            const unsafeResult = '${{ needs.unsafe-check.result }}';

            const allPassed = auditResult === 'success' && secretsResult === 'success' && unsafeResult === 'success';
            const icon = allPassed ? ':white_check_mark:' : ':warning:';
            const summary = allPassed
              ? 'All security checks passed.'
              : `Some checks need attention: audit=${auditResult}, secrets=${secretsResult}, unsafe=${unsafeResult}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${icon} Security Scan Results\n\n${summary}\n\nSee individual job logs for details.\n\n---\n*Powered by rdi-dev-env security scanner*`
            });

# Go Tests — go test + coverage gate
# Copy to: .github/workflows/test-go.yml

name: Tests

on:
  pull_request:
    branches: ["<!-- CUSTOMIZE: default_branch -->"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: ["<!-- CUSTOMIZE: default_branch -->"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  COVERAGE_THRESHOLD: 80

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic -v

      - name: Enforce coverage threshold
        if: env.COVERAGE_THRESHOLD != '0'
        run: |
          ACTUAL=$(go tool cover -func=coverage.out | grep total | awk '{print int($3)}')
          echo "Coverage: ${ACTUAL}% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
          if [ "${ACTUAL:-0}" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
            echo "::error::Coverage ${ACTUAL}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

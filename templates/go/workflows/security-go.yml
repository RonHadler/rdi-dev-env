# Go Security Scan — govulncheck + secret detection + SAST
# Copy to: .github/workflows/security-go.yml

name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: '1.23'
  BLOCK_ON_CRITICAL: 'false'

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ── Tier 1: Dependency Vulnerabilities ──
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Dependency audit
        id: deps
        continue-on-error: true
        run: |
          echo "## Dependency Audit" > deps-report.md
          TOTAL=0

          VULN_OUTPUT=$(govulncheck ./... 2>&1 || true)

          TOTAL=$(printf "%s\n" "$VULN_OUTPUT" | grep -c "Vulnerability" || true)

          if [ "$TOTAL" -gt 0 ]; then
            echo "**Found $TOTAL vulnerability(ies):**" >> deps-report.md
            echo '```' >> deps-report.md
            printf "%s\n" "$VULN_OUTPUT" | head -30 >> deps-report.md
            echo '```' >> deps-report.md
          else
            echo "No known vulnerabilities found." >> deps-report.md
          fi

          echo "high_critical=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      # ── Tier 2: Secret Detection ──
      - name: Secret detection
        id: secrets
        run: |
          echo "## Secret Detection" > secrets-report.md
          FOUND=0

          KEYS=$(grep -rnE \
            '(sk-[a-zA-Z0-9_-]{20,}|AIza[a-zA-Z0-9_-]{35}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36})' \
            --include='*.go' --include='*.yaml' --include='*.yml' \
            --include='*.json' --include='*.toml' \
            --exclude-dir=vendor --exclude-dir=.git --exclude-dir=testdata \
            --exclude='*_test.go' \
            --exclude='ci*.yml' --exclude='security*.yml' --exclude='quality-gate*' \
            . 2>/dev/null || true)

          if [ -n "$KEYS" ]; then
            FOUND=$(printf "%s\n" "$KEYS" | wc -l)
            echo "**CRITICAL: Possible hardcoded API keys found ($FOUND occurrences)**" >> secrets-report.md
            echo '```' >> secrets-report.md
            printf "%s\n" "$KEYS" | awk -F: '{print $1":"$2}' | head -10 >> secrets-report.md || true
            echo '```' >> secrets-report.md
          else
            echo "No hardcoded secrets detected." >> secrets-report.md
          fi

          echo "count=$FOUND" >> "$GITHUB_OUTPUT"

      # ── Tier 3: SAST (gosec + pattern checks) ──
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: SAST pattern check
        id: sast
        run: |
          echo "## SAST Patterns" > sast-report.md
          FOUND=0

          # gosec — covers SQL injection (G201/G202), hardcoded creds, and more
          GOSEC_OUTPUT=$(gosec -no-fail -fmt text ./... 2>&1 || true)
          GOSEC_COUNT=$(printf "%s\n" "$GOSEC_OUTPUT" | grep -c '^\[' || true)

          if [ "$GOSEC_COUNT" -gt 0 ]; then
            FOUND=$((FOUND + GOSEC_COUNT))
            echo "**gosec findings ($GOSEC_COUNT issues):**" >> sast-report.md
            echo '```' >> sast-report.md
            printf "%s\n" "$GOSEC_OUTPUT" | grep -A2 '^\[' | head -30 >> sast-report.md || true
            echo '```' >> sast-report.md
          fi

          # unsafe package usage
          UNSAFE=$(grep -rnE '\b"unsafe"\b' \
            --include='*.go' \
            --exclude-dir=vendor --exclude-dir=.git --exclude-dir=testdata \
            --exclude='*_test.go' \
            . 2>/dev/null || true)

          if [ -n "$UNSAFE" ]; then
            COUNT=$(printf "%s\n" "$UNSAFE" | wc -l)
            FOUND=$((FOUND + COUNT))
            echo "**unsafe package usage ($COUNT occurrences):**" >> sast-report.md
            echo '```' >> sast-report.md
            printf "%s\n" "$UNSAFE" | head -5 >> sast-report.md || true
            echo '```' >> sast-report.md
          fi

          # os/exec with potential user input
          EXEC=$(grep -rnE 'exec\.Command\(' \
            --include='*.go' \
            --exclude-dir=vendor --exclude-dir=.git --exclude-dir=testdata \
            --exclude='*_test.go' \
            . 2>/dev/null || true)

          if [ -n "$EXEC" ]; then
            COUNT=$(printf "%s\n" "$EXEC" | wc -l)
            FOUND=$((FOUND + COUNT))
            echo "**os/exec usage ($COUNT occurrences) — verify no user input:**" >> sast-report.md
            echo '```' >> sast-report.md
            printf "%s\n" "$EXEC" | head -5 >> sast-report.md || true
            echo '```' >> sast-report.md
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "No SAST patterns detected." >> sast-report.md
          fi

          echo "count=$FOUND" >> "$GITHUB_OUTPUT"

      # ── Post Summary ──
      - name: Post security report
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const read = (f) => { try { return fs.readFileSync(f, 'utf8'); } catch { return 'Scan skipped.'; } };
            const deps = read('deps-report.md');
            const secrets = read('secrets-report.md');
            const sast = read('sast-report.md');

            const depsCount = '${{ steps.deps.outputs.high_critical }}' || '0';
            const secretsCount = '${{ steps.secrets.outputs.count }}' || '0';
            const sastCount = '${{ steps.sast.outputs.count }}' || '0';

            const total = parseInt(depsCount) + parseInt(secretsCount) + parseInt(sastCount);
            const status = total > 0 ? ':warning:' : ':white_check_mark:';

            const body = [
              `## ${status} Security Scan Summary`,
              '',
              '| Check | Findings |',
              '|-------|----------|',
              `| Dependencies (govulncheck) | ${depsCount} |`,
              `| Hardcoded Secrets | ${secretsCount} |`,
              `| SAST Patterns | ${sastCount} |`,
              '',
              '---',
              '',
              deps,
              '',
              secrets,
              '',
              sast,
              '',
              '---',
              '*Powered by rdi-dev-env security scanner*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Step Summary (visible on scheduled runs without a PR) ──
      - name: Output to Step Summary
        if: always()
        run: |
          for f in deps-report.md secrets-report.md sast-report.md; do
            if [ -f "$f" ]; then cat "$f" >> "$GITHUB_STEP_SUMMARY"; printf "\n" >> "$GITHUB_STEP_SUMMARY"; fi
          done

      # ── Optional: Fail on critical ──
      - name: Fail on critical findings
        if: env.BLOCK_ON_CRITICAL == 'true'
        run: |
          SECRETS="${{ steps.secrets.outputs.count || '0' }}"
          DEPS="${{ steps.deps.outputs.high_critical || '0' }}"

          if [ "${SECRETS:-0}" -gt 0 ] || [ "${DEPS:-0}" -gt 0 ]; then
            echo "::error::Critical security findings detected (secrets: $SECRETS, deps vulnerabilities: $DEPS)"
            exit 1
          fi
